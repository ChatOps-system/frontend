<chat-messages />
<section class="sticky bottom-0 left-0 right-0 p-4">
  <chat-input
    [message]="this.message()"
    (changeMessage)="this.onChangeMessage($event)"
    (detectIncident)="this.detectIncident()"
  />
</section>
@if (this.openIncidentDetectedToast()) {
  <chat-incident-detected-toast
    (closeIncidentDetectedToast)="onCloseIncidentDetectedToast()"
    (generateIncidentDraft)="generateIncidentDraft()"
  />
}
<dialog
  #createIncidentReportModal
  id="createIncidentReportModal"
  class="modal modal-bottom sm:modal-middle"
>
  <div class="modal-box">
    @if (this.incidentDraft(); as draft) {
      <incident-draft
        [draft]="draft"
        (createIncidentReport)="createIncidentReport($event)"
        (closeIncidentDraft)="onCloseIncidentDraft()"
      />
    }
  </div>
</dialog>
